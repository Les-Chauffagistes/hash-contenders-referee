name: build-and-release

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          pip install prisma

      - name: Start PostgreSQL (Docker)
        run: |
          docker rm -f pg-test 2>/dev/null || true

          docker run -d \
            --name pg-test \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=referee_test \
            -p 5431:5432 \
            postgres:16

          # attente readiness
          until docker exec pg-test pg_isready -U postgres; do
            sleep 1
          done

      - name: Setup database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5431/referee_test
        run: |
          source venv/bin/activate
          prisma db push --skip-generate
          prisma generate

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5431/referee_test
        run: |
          source venv/bin/activate
          PYTHONPATH=. pytest tests/ -v

      - name: Cleanup PostgreSQL
        if: always()
        run: docker rm -f pg-test || true

  build:
    needs: test
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Pack
        run: |
          TS=$(date -u +"%Y%m%dT%H%M%SZ")
          mkdir -p artifact
          tar -C . -czf artifact/referee.chauffagistes-${TS}.tar.gz \
            src tests prisma requirements.txt main.py init.py state.py
          echo "TS=$TS" >> $GITHUB_ENV

      - name: Push git tag
        env:
          GITHUB_PAT: ${{ secrets.GLOBAL_DEPLOY_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin https://github.com/Les-Chauffagistes/hash-contenders-referee.git
          git config credential.helper '!f() { echo "username=x-access-token"; echo "password=$GITHUB_PAT"; }; f'

          git tag v$TS
          git push origin v$TS
      
      - name: Debug token presence
        run: |
          if [ -z "${{ secrets.GLOBAL_DEPLOY_TOKEN }}" ]; then
            echo "TOKEN EMPTY"
            exit 1
          else
            echo "TOKEN OK"
          fi

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GLOBAL_DEPLOY_TOKEN }}
        with:
          tag_name: "v${{ env.TS }}"
          release_name: "Release ${{ env.TS }}"
          body: "Automated release ${{ env.TS }}"
          draft: false
          prerelease: false

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GLOBAL_DEPLOY_TOKEN }}
        with:
          files: artifact/referee.chauffagistes-${{ env.TS }}.tar.gz
          tag_name: v${{ env.TS }}

      - name: notify-deploy
        run: |
          curl -X POST ${{ secrets.DEPLOY_URL }} \
            -H "X-Deploy-Token: ${{ secrets.GLOBAL_DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"repository": {"full_name": "Les-Chauffagistes/hash-contenders-referee"}}'