name: build-and-release
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, macOS]

    services:
      postgres:
        image: postgres:18.1-alpine3.23
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: referee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          pip install prisma

      - name: Setup database
        env:
          DATABASE_URL: postgresql://localhost:5432/referee_test
        run: |
          createdb referee_test 2>/dev/null || true
          source venv/bin/activate
          prisma db push --skip-generate
          prisma generate

      - name: Run tests
        env:
          DATABASE_URL: postgresql://localhost:5432/referee_test
        run: |
          source venv/bin/activate
          PYTHONPATH=. pytest tests/ -v

      - name: Cleanup
        if: always()
        run: dropdb referee_test 2>/dev/null || true

  build:
    needs: test
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Pack
        run: |
          TS=$(date -u +"%Y%m%dT%H%M%SZ")
          mkdir -p artifact
          tar -C . -czf artifact/referee.chauffagistes-${TS}.tar.gz \
            src tests prisma requirements.txt main.py init.py state.py
          echo "TS=$TS" >> $GITHUB_ENV

      - name: Push git tag
        env:
          GITHUB_PAT: ${{ secrets.GLOBAL_DEPLOY_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          # Setup credential helper pour utiliser le token
          git remote set-url origin https://github.com/Les-Chauffagistes/hash-contenders-referee.git
          git config credential.helper '!f() { echo "username=x-access-token"; echo "password=$GITHUB_PAT"; }; f'
      
          git tag v$TS
          git push origin v$TS

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "v${{ env.TS }}"
          release_name: "Release ${{ env.TS }}"
          body: "Automated release ${{ env.TS }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GLOBAL_DEPLOY_TOKEN }}

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v1
        with:
          files: artifact/referee.chauffagistes-${{ env.TS }}.tar.gz
          tag_name: v${{ env.TS }}
        env:
          GITHUB_TOKEN: ${{ secrets.GLOBAL_DEPLOY_TOKEN }}

      - name: notify-deploy
        run: |
          curl -X POST ${{ secrets.DEPLOY_URL }} \
            -H "X-Deploy-Token: ${{ secrets.GLOBAL_DEPLOY_TOKEN }}" \
            -d '{"repository": {"full_name": "Les-Chauffagistes/Les-Chauffagistes/hash-contenders-referee"}}'
